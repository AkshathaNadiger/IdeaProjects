# Application info
spring.application.name=SpringBootExample_2
application.title=Student Management System using Spring Boot and MySQL
application.version=0.0.1

# Server
server.port=9078

# Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/springexample?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL5Dialect
